apiVersion: v2
name: evidentrx
description: |
  EvidentRx — 340B Pharmaceutical Compliance Intelligence Platform.
  Production-hardened enterprise deployment chart for regulated healthcare environments.
type: application
version: 9.0.0
appVersion: "9.0.0"
keywords:
  - 340b
  - compliance
  - pharma
  - audit
  - healthcare
home: https://evidentrx.internal
maintainers:
  - name: EvidentRx Platform Team
dependencies:
  - name: postgresql
    version: "^14.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "^18.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
