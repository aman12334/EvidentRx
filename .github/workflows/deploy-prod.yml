name: Deploy — Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # semver tags only: v9.0.0, v9.1.0, etc.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote to production (required)"
        required: true

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ghcr.io/${{ github.repository_owner }}/evidentrx
  ENVIRONMENT:   production
  NAMESPACE:     evidentrx
  HELM_RELEASE:  evidentrx

jobs:

  # Production deployments require explicit approval via GitHub environment protection rules.
  # Configure required reviewers on the "production" environment in repo settings.

  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve_tag.outputs.tag }}
    permissions:
      contents: read
      packages:  write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    deploy/Dockerfile
          push:    true
          tags:    |
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.resolve_tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    deploy/Dockerfile.worker
          push:    true
          tags:    |
            ${{ env.IMAGE_PREFIX }}/worker:${{ steps.resolve_tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/worker:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-prod:
    name: Helm Deploy — Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production   # ← requires manual approval gate
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - uses: azure/k8s-set-context@v4
        with:
          method:     kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Pre-deployment database backup
        run: |
          kubectl create job --from=cronjob/evidentrx-backup \
            evidentrx-pre-deploy-backup-$(date +%s) \
            -n ${{ env.NAMESPACE }} || true

      - name: Helm upgrade — production
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f helm/values.yaml \
            -f helm/values.prod.yaml \
            --set global.image.registry=${{ env.REGISTRY }}/${{ github.repository_owner }}/evidentrx \
            --set global.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set secrets.jwtSecretKey="${{ secrets.JWT_SECRET_KEY_PROD }}" \
            --set secrets.databaseUrl="${{ secrets.DATABASE_URL_PROD }}" \
            --set secrets.redisUrl="${{ secrets.REDIS_URL_PROD }}" \
            --atomic \
            --timeout 8m   # --atomic rolls back automatically on failure

      - name: Validate deployment
        run: bash scripts/validate_deployment.sh ${{ env.NAMESPACE }}

      - name: Tag successful production deploy
        if: success()
        run: |
          git tag "prod-deploy-$(date +%Y%m%d-%H%M%S)-${{ needs.build-and-push.outputs.image_tag }}" || true
