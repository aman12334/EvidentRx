name: Deploy — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: sha of HEAD)"
        required: false

env:
  REGISTRY:       ghcr.io
  IMAGE_PREFIX:   ghcr.io/${{ github.repository_owner }}/evidentrx
  ENVIRONMENT:    staging
  NAMESPACE:      evidentrx-staging
  HELM_RELEASE:   evidentrx-staging

jobs:

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages:  write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_PREFIX }}/api
            ${{ env.IMAGE_PREFIX }}/worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=staging-latest

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    deploy/Dockerfile
          push:    true
          tags:    ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.version }},${{ env.IMAGE_PREFIX }}/api:staging-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    deploy/Dockerfile.worker
          push:    true
          tags:    ${{ env.IMAGE_PREFIX }}/worker:${{ steps.meta.outputs.version }},${{ env.IMAGE_PREFIX }}/worker:staging-latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-staging:
    name: Helm Deploy — Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - uses: azure/k8s-set-context@v4
        with:
          method:     kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Helm upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f helm/values.yaml \
            --set global.image.registry=${{ env.REGISTRY }}/${{ github.repository_owner }}/evidentrx \
            --set global.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set global.environment=staging \
            --set secrets.jwtSecretKey="${{ secrets.JWT_SECRET_KEY_STAGING }}" \
            --set secrets.databaseUrl="${{ secrets.DATABASE_URL_STAGING }}" \
            --set secrets.redisUrl="${{ secrets.REDIS_URL_STAGING }}" \
            --wait \
            --timeout 5m

      - name: Validate deployment
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api \
            -n ${{ env.NAMESPACE }} --timeout=3m

      - name: Run smoke tests
        run: |
          API_URL=$(kubectl get svc ${{ env.HELM_RELEASE }}-api \
            -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f "http://${API_URL}/api/health" || exit 1
