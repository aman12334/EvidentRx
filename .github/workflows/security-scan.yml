name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # weekly Monday 03:00 UTC

permissions:
  contents:      read
  security-events: write   # required to upload SARIF results to GitHub Security

jobs:

  # ── Dependency vulnerability scan ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --requirement requirements.txt --format=json --output=pip-audit.json || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline 2>/dev/null || npm install

      - name: Audit frontend dependencies
        working-directory: frontend
        # Non-blocking: results are uploaded as an artifact for review.
        # npm audit exits non-zero when vulnerabilities are found; we capture
        # the report but don't fail CI here — the SARIF upload covers alerting.
        run: npm audit --audit-level=high --json > npm-audit.json 2>&1 || true

      - name: Upload npm-audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: frontend/npm-audit.json

  # ── Static analysis — Bandit (Python security linter) ────────────────────────
  bandit:
    name: Bandit — Python Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.venv,./frontend,./tests \
            --severity-level medium \
            -f json \
            -o bandit-report.json || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Container image scan — Trivy ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy — Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v5
        with:
          context: .
          file:    deploy/Dockerfile
          push:    false
          load:    true
          tags:    evidentrx/api:scan

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:        "evidentrx/api:scan"
          format:           "sarif"
          output:           "trivy-results.sarif"
          severity:         "CRITICAL,HIGH"
          # exit-code 0: Trivy is informational — findings are uploaded to
          # GitHub Security (SARIF) for review but do NOT block CI.
          # Rationale: base-image OS CVEs (python:3.11-slim / Debian bookworm)
          # are outside our control and change with every Trivy DB update.
          # Blocking every push on unactionable OS-layer CVEs creates noise
          # without improving security posture.  Address fixable findings via
          # the GitHub Security tab on a scheduled cadence.
          ignore-unfixed:   true
          trivyignores:     ".trivyignore"
          exit-code:        "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Secrets detection — Gitleaks ─────────────────────────────────────────────
  secrets-scan:
    name: Gitleaks — Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
