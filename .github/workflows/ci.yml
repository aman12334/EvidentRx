name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel superseded runs on the same branch

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

jobs:

  # ── Backend lint & type check ────────────────────────────────────────────────
  lint-backend:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports --no-error-summary

  # ── Backend unit tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     evidentrx
          POSTGRES_PASSWORD: evidentrx
          POSTGRES_DB:       evidentrx_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL:      "postgresql+asyncpg://evidentrx:evidentrx@localhost:5432/evidentrx_test"
      CELERY_BROKER_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY:    "test_secret_key_for_ci_only_not_production_32c"
      ENVIRONMENT:       "test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: |
          pytest tests/ \
            --cov=api/routers \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -v \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Frontend lint & type check ────────────────────────────────────────────────
  lint-frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  # ── Frontend tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --watchAll=false

  # ── Docker build validation ───────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Helm chart validation ─────────────────────────────────────────────────────
  helm-lint:
    name: Helm — Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Add Bitnami chart repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Resolve Helm chart dependencies
        # Downloads postgresql + redis sub-charts declared in Chart.yaml
        run: helm dependency update helm/

      - name: Helm lint
        run: helm lint helm/ -f helm/values.yaml

      - name: Helm template (staging)
        run: helm template evidentrx helm/ -f helm/values.yaml > /dev/null

      - name: Helm template (production)
        run: helm template evidentrx helm/ -f helm/values.yaml -f helm/values.prod.yaml > /dev/null
