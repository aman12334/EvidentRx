# EvidentRx — Full local development stack
#
# Services:
#   api       — FastAPI application (port 8000)
#   worker    — Celery task worker
#   beat      — Celery beat scheduler
#   db        — PostgreSQL 15 (port 5432)
#   redis     — Redis 7 (port 6379)
#   frontend  — Next.js dev server (port 3000)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f api
#   docker compose down -v   # remove volumes too

version: "3.9"

x-api-common: &api-common
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file: ../.env
  environment:
    ENVIRONMENT: development
    DATABASE_URL: "postgresql+asyncpg://evidentrx:evidentrx@db:5432/evidentrx"
    CELERY_BROKER_URL: "redis://redis:6379/0"
    CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - evidentrx-net
  restart: unless-stopped

services:

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    <<: *api-common
    command: ["api"]
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://evidentrx:evidentrx@db:5432/evidentrx"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      UVICORN_WORKERS: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    <<: *api-common
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    command: ["worker"]
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://evidentrx:evidentrx@db:5432/evidentrx"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      CELERY_CONCURRENCY: "2"

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  beat:
    <<: *api-common
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    command: ["beat"]
    environment:
      ENVIRONMENT: development
      DATABASE_URL: "postgresql+asyncpg://evidentrx:evidentrx@db:5432/evidentrx"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     evidentrx
      POSTGRES_PASSWORD: evidentrx
      POSTGRES_DB:       evidentrx
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - evidentrx-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidentrx -d evidentrx"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - evidentrx-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - evidentrx-net
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:

networks:
  evidentrx-net:
    driver: bridge
