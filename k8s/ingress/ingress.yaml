apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evidentrx-ingress
  namespace: evidentrx
  labels:
    app.kubernetes.io/part-of: evidentrx-platform
  annotations:
    kubernetes.io/ingress.class:                    "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect:       "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting at ingress layer (secondary to app-level)
    nginx.ingress.kubernetes.io/limit-rps:          "50"
    nginx.ingress.kubernetes.io/limit-connections:  "20"
    # Request size cap — prevents large payload attacks
    nginx.ingress.kubernetes.io/proxy-body-size:    "10m"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # TLS cert managed by cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Security headers (additional to app-level SecurityHeadersMiddleware)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Forwarded-Proto: https";
      more_set_headers "X-Real-IP: $remote_addr";
spec:
  tls:
    - hosts:
        - api.evidentrx.internal
        - evidentrx.internal
      secretName: evidentrx-tls
  rules:
    - host: api.evidentrx.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: evidentrx-api
                port:
                  number: 80

    - host: evidentrx.internal
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: evidentrx-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: evidentrx-frontend
                port:
                  number: 3000
