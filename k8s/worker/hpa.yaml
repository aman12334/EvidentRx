apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: evidentrx-worker-hpa
  namespace: evidentrx
  labels:
    app: evidentrx-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: evidentrx-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 90
    scaleDown:
      stabilizationWindowSeconds: 600   # 10-min cooldown — workers hold long tasks
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 180
