apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidentrx-worker
  namespace: evidentrx
  labels:
    app: evidentrx-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: evidentrx-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evidentrx-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: evidentrx-worker
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: evidentrx-worker
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
      terminationGracePeriodSeconds: 120  # allow long-running tasks to finish
      containers:
        - name: worker
          image: evidentrx/worker:9.0.0
          imagePullPolicy: Always
          command: ["deploy/entrypoint.sh", "worker"]
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: info
            - name: JSON_LOGS
              value: "true"
            - name: CELERY_CONCURRENCY
              value: "4"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: evidentrx-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: evidentrx-secrets
                  key: jwt-secret-key
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: evidentrx-secrets
                  key: redis-url
          envFrom:
            - configMapRef:
                name: evidentrx-config
          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "3Gi"
          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "celery -A tasks.queue.celery_app inspect ping -d celery@$HOSTNAME --timeout=10"
            initialDelaySeconds: 30
            periodSeconds:       60
            failureThreshold:    3
            timeoutSeconds:      15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: runtime-state
              mountPath: /app/runtime_state
      volumes:
        - name: tmp
          emptyDir: {}
        - name: runtime-state
          persistentVolumeClaim:
            claimName: evidentrx-runtime-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: evidentrx-worker
                topologyKey: kubernetes.io/hostname
